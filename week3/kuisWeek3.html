<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis</title>
</head>
<body>
    <button id="buton" onclick="tambah()">Click me!</button>
    <h2 id="angka">You have clicked the button <span id="display_angka">0</span> time(s) in this session</h2>
    <h2>Click the button to see the counter increase.</h2>
    <h2>Close the browser tab (or window), and try again, and the counter is not reset</h2>

    <script>
        let angka = localStorage.getItem("simpananAngka") || 0;
        document.getElementById("display_angka").innerHTML = angka;

        function tambah() {
            angka++;
            document.getElementById("display_angka").innerHTML = angka;
            localStorage.setItem("simpananAngka", angka);
        }
    </script>
</body>
</html>
